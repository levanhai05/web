<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý sinh viên</title>

    <!-- Bootstrap -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <!-- Custom CSS -->
    <style>
        body {
            background: linear-gradient(135deg, #eef2f7, #dbeafe);
            min-height: 100vh;
        }

        .app-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 24px;
        }

        h3, h4 {
            font-weight: 700;
            color: #1e293b;
        }

        .table thead {
            background: linear-gradient(90deg, #2563eb, #1d4ed8);
            color: white;
        }

        .table tbody tr:hover {
            background-color: #f1f5f9;
            transition: 0.2s;
        }

        .form-control, .form-select {
            border-radius: 10px;
        }

        .btn {
            border-radius: 10px;
            padding: 6px 14px;
        }

        .btn-primary {
            background: linear-gradient(90deg, #2563eb, #1d4ed8);
            border: none;
        }

        .btn-warning {
            background: linear-gradient(90deg, #f59e0b, #d97706);
            border: none;
            color: #fff;
        }

        .btn-danger {
            background: linear-gradient(90deg, #ef4444, #dc2626);
            border: none;
        }

        .search-box {
            border-radius: 999px;
            padding-left: 20px;
        }

        .divider {
            height: 1px;
            background: #e5e7eb;
            margin: 30px 0;
        }
    </style>
</head>

<body class="container py-5">

<div class="app-card">

    <h3 class="mb-4 text-center">📚 QUẢN LÝ SINH VIÊN</h3>

    <!-- Tìm kiếm -->
    <input type="text" id="search"
           class="form-control mb-4 search-box"
           placeholder="🔍 Tìm theo tên sinh viên..."
           onkeyup="searchStudent()">

    <!-- Bảng -->
    <div class="table-responsive">
        <table class="table table-bordered align-middle text-center">
            <thead>
            <tr>
                <th>ID</th>
                <th>Tên</th>
                <th>Email</th>
                <th>Tuổi</th>
                <th>Giới tính</th>
                <th>Hành động</th>
            </tr>
            </thead>
            <tbody id="studentTable"></tbody>
        </table>
    </div>

    <div class="divider"></div>

    <h4 id="formTitle" class="mb-3">➕ Thêm sinh viên</h4>

    <!-- Form -->
    <input type="hidden" id="id">

    <div class="row g-3">
        <div class="col-md-6">
            <input id="name" class="form-control" placeholder="Tên sinh viên">
        </div>
        <div class="col-md-6">
            <input id="email" class="form-control" placeholder="Email">
        </div>
        <div class="col-md-6">
            <input id="age" type="number" class="form-control" placeholder="Tuổi">
        </div>
        <div class="col-md-6">
            <select id="gender" class="form-select">
                <option value="">-- Chọn giới tính --</option>
                <option value="Nam">Nam</option>
                <option value="Nữ">Nữ</option>
                <option value="Khác">Khác</option>
            </select>
        </div>
    </div>

    <div class="mt-4 text-end">
        <button class="btn btn-primary me-2" onclick="saveStudent()">💾 Lưu</button>
        <button class="btn btn-secondary" onclick="resetForm()">↩ Hủy</button>
    </div>

</div>

<script>
const API = "/api/students";

function loadStudents() {
    fetch(API)
        .then(res => res.json())
        .then(data => renderTable(data));
}

function renderTable(data) {
    let html = "";
    data.forEach(s => {
        html += `
        <tr>
            <td>${s.id}</td>
            <td>${s.name}</td>
            <td>${s.email}</td>
            <td>${s.age}</td>
            <td>${s.gender}</td>
            <td>
                <button class="btn btn-warning btn-sm me-1"
                    onclick="editStudent(${s.id}, '${s.name}', '${s.email}', ${s.age}, '${s.gender}')">
                    ✏️
                </button>
                <button class="btn btn-danger btn-sm"
                    onclick="deleteStudent(${s.id})">
                    🗑
                </button>
            </td>
        </tr>`;
    });
    document.getElementById("studentTable").innerHTML = html;
}

function saveStudent() {
    const id = document.getElementById("id").value;
    const student = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        age: document.getElementById("age").value,
        gender: document.getElementById("gender").value
    };

    if (id) {
        fetch(`${API}/${id}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(student)
        }).then(() => {
            resetForm();
            loadStudents();
        });
    } else {
        fetch(API, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(student)
        }).then(() => {
            resetForm();
            loadStudents();
        });
    }
}

function editStudent(id, name, email, age, gender) {
    document.getElementById("id").value = id;
    document.getElementById("name").value = name;
    document.getElementById("email").value = email;
    document.getElementById("age").value = age;
    document.getElementById("gender").value = gender;
    document.getElementById("formTitle").innerText = "✏️ Cập nhật sinh viên";
}

function deleteStudent(id) {
    if (!confirm("Bạn có chắc muốn xóa?")) return;
    fetch(`${API}/${id}`, { method: "DELETE" })
        .then(() => loadStudents());
}


function searchStudent() {
    const name = document.getElementById("search").value;
    fetch(`${API}/search?name=${name}`)
        .then(res => res.json())
        .then(data => renderTable(data));
}

function resetForm() {
    document.getElementById("id").value = "";
    document.getElementById("name").value = "";
    document.getElementById("email").value = "";
    document.getElementById("age").value = "";
    document.getElementById("gender").value = "";
    document.getElementById("formTitle").innerText = "➕ Thêm sinh viên";
}

loadStudents();
</script>

</body>
</html>
